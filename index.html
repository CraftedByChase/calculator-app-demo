<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="main.js"></script>
    </head>
    <body>
        <h1 id="heading">HTML5 Calculator</h1>
        <div id="github">
            <img src="github-logo.png" id="git-logo"/>
            <a href="https://github.com/CraftedByChase/calculator-app-demo" target="_blank">Github</a>
        </div>
        <br><br><br>
        <div id="calcbody">
            <div id="output">0</div>
            <div id="buttons">
                <div class="calcbutton big" onclick="clearButton()">C</div>
                <div class="calcbutton big" onclick="appendOutput('/')">/</div>
                <div class="calcbutton" onclick="appendOutput('7')">7</div>
                <div class="calcbutton" onclick="appendOutput('8')">8</div>
                <div class="calcbutton" onclick="appendOutput('9')">9</div>
                <div class="calcbutton" onclick="appendOutput('*')">*</div>
                <div class="calcbutton" onclick="appendOutput('4')">4</div>
                <div class="calcbutton" onclick="appendOutput('5')">5</div>
                <div class="calcbutton" onclick="appendOutput('6')">6</div>
                <div class="calcbutton" onclick="appendOutput('-')">-</div>
                <div class="calcbutton" onclick="appendOutput('1')">1</div>
                <div class="calcbutton" onclick="appendOutput('2')">2</div>
                <div class="calcbutton" onclick="appendOutput('3')">3</div>
                <div class="calcbutton" onclick="appendOutput('+')">+</div>
                <div class="calcbutton medium" onclick="appendOutput('0')">0</div>
                <div class="calcbutton medium" onclick="swap()">+/-</div>
                <div class="calcbutton medium" onclick="calculate()">=</div>
            </div>
        </div>
    </body>
</html>
